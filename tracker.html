<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>트래커</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --card: #1a2335;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --warn: #ff6b35;
    --text: #f0f4f8;
    --muted: #6b7f9a;
    --border: #1f2d42;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px);
  }

  /* 상단 상태바 */
  .status-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px 16px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.4s;
  }
  .status-dot.gps-on { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.tracking { background: var(--warn); animation: pulse-dot 1.2s infinite; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .accuracy-badge {
    font-size: 11px;
    color: var(--muted);
  }

  /* 메인 거리 표시 */
  .distance-hero {
    flex: 0 0 auto;
    text-align: center;
    margin: 8px 0 4px;
    position: relative;
  }

  .distance-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .distance-value {
    font-size: 86px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -3px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    transition: all 0.3s;
  }

  .distance-unit {
    font-size: 22px;
    font-weight: 400;
    color: var(--muted);
    margin-left: 4px;
    -webkit-text-fill-color: var(--muted);
  }

  /* 통계 카드 그리드 */
  .stats-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 12px 0;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-card.wide {
    grid-column: 1 / -1;
  }

  .stat-icon {
    font-size: 18px;
    margin-bottom: 2px;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-value {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
  }

  .stat-sub {
    font-size: 11px;
    color: var(--muted);
  }

  /* 페이스 바 */
  .pace-bar-wrap {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .pace-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s ease;
  }

  /* 활동 타입 */
  .activity-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .activity-icon {
    font-size: 28px;
  }

  .activity-info { flex: 1; }
  .activity-type {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .activity-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .speed-now {
    text-align: right;
  }
  .speed-num {
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
  }
  .speed-lbl {
    font-size: 10px;
    color: var(--muted);
  }

  /* 버튼 영역 */
  .btn-area {
    width: 100%;
    margin-top: auto;
    padding-top: 8px;
  }

  .btn-start {
    width: 100%;
    height: 60px;
    border: none;
    border-radius: 18px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
  }

  .btn-start:active { transform: scale(0.97); }

  .btn-stop {
    width: 100%;
    height: 60px;
    border: none;
    border-radius: 18px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.1s;
    background: linear-gradient(135deg, var(--warn) 0%, #ff4444 100%);
    color: #fff;
    display: none;
  }

  .btn-stop:active { transform: scale(0.97); }

  /* 결과 모달 */
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .result-overlay.show { display: flex; }

  .result-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px 24px 24px;
    width: 100%;
    max-width: 340px;
    text-align: center;
  }

  .result-title {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .result-emoji { font-size: 48px; margin-bottom: 8px; }

  .result-distance {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .result-unit { font-size: 20px; color: var(--muted); -webkit-text-fill-color: var(--muted); }

  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin: 20px 0;
  }

  .r-stat {
    background: var(--card);
    border-radius: 12px;
    padding: 10px 6px;
  }

  .r-stat-val { font-size: 18px; font-weight: 600; }
  .r-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .btn-reset {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  /* 토스트 메시지 */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- 상단 상태 -->
<div class="status-bar">
  <div class="status-pill">
    <div class="status-dot" id="gpsDot"></div>
    <span id="gpsLabel">GPS 대기</span>
  </div>
  <div class="accuracy-badge" id="accuracyBadge">정확도 --m</div>
  <div class="status-pill">
    <div class="status-dot" id="trackDot"></div>
    <span id="trackLabel">대기</span>
  </div>
</div>

<!-- 메인 거리 -->
<div class="distance-hero">
  <div class="distance-label">이동 거리</div>
  <div>
    <span class="distance-value" id="distanceVal">0.00</span>
    <span class="distance-unit" id="distanceUnit">km</span>
  </div>
</div>

<!-- 통계 카드 -->
<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon">👟</div>
    <div class="stat-label">걸음 수 (추산)</div>
    <div class="stat-value" id="stepsVal">0</div>
    <div class="stat-sub">보</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">⏱</div>
    <div class="stat-label">경과 시간</div>
    <div class="stat-value" id="timeVal">00:00</div>
    <div class="stat-sub" id="timeSub">--</div>
  </div>
  <div class="stat-card wide">
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <div class="stat-icon">⚡</div>
        <div class="stat-label">페이스</div>
        <div class="stat-value" id="paceVal">--'--"</div>
        <div class="stat-sub">분/km</div>
      </div>
      <div style="text-align:right;">
        <div class="stat-label" style="margin-bottom:4px;">현재 속도</div>
        <div class="stat-value" style="font-size:22px;" id="speedVal">0.0</div>
        <div class="stat-sub">km/h</div>
      </div>
    </div>
    <div class="pace-bar-wrap">
      <div class="pace-bar" id="paceBar"></div>
    </div>
  </div>
</div>

<!-- 활동 타입 -->
<div class="activity-card">
  <div class="activity-icon" id="actIcon">🔍</div>
  <div class="activity-info">
    <div class="activity-type" id="actType">감지 중</div>
    <div class="activity-desc" id="actDesc">시작 버튼을 눌러주세요</div>
  </div>
  <div class="speed-now">
    <div class="speed-num" id="altVal">--</div>
    <div class="speed-lbl">고도(m)</div>
  </div>
</div>

<!-- 버튼 -->
<div class="btn-area">
  <button class="btn-start" id="btnStart" onclick="startTracking()">▶ 시작</button>
  <button class="btn-stop" id="btnStop" onclick="stopTracking()">■ 종료</button>
</div>

<!-- 결과 모달 -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-title">운동 완료</div>
    <div class="result-emoji" id="resEmoji">🏃</div>
    <div>
      <span class="result-distance" id="resDistance">0.00</span>
      <span class="result-unit" id="resUnit">km</span>
    </div>
    <div class="result-stats">
      <div class="r-stat">
        <div class="r-stat-val" id="resSteps">0</div>
        <div class="r-stat-lbl">걸음</div>
      </div>
      <div class="r-stat">
        <div class="r-stat-val" id="resTime">0:00</div>
        <div class="r-stat-lbl">시간</div>
      </div>
      <div class="r-stat">
        <div class="r-stat-val" id="resPace">--</div>
        <div class="r-stat-lbl">분/km</div>
      </div>
    </div>
    <div class="r-stat" style="margin-bottom:12px; padding:10px;">
      <div class="r-stat-val" id="resActivity">산책</div>
      <div class="r-stat-lbl">활동 유형</div>
    </div>
    <button class="btn-reset" onclick="resetAll()">새 운동 시작</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ── 상태 변수 ──────────────────────────────────────────────
let watchId = null;
let isTracking = false;
let startTime = null;
let timerInterval = null;

let totalDistance = 0;       // km
let lastPos = null;          // {lat, lng, alt}
let positions = [];          // GPS 경로
let currentSpeed = 0;        // km/h
let currentAlt = null;
let altitudeGain = 0;        // 누적 고도 상승 m
let lastAlt = null;
let speedHistory = [];       // 최근 속도 이력

// 걸음 수 추산용 (보폭: 기본 0.75m, 속도에 따라 조정)
function estimateStride(speedKmh) {
  if (speedKmh > 8) return 1.2;   // 런닝
  if (speedKmh > 5) return 0.95;  // 빠른 걷기
  return 0.72;                     // 일반 걷기/등산
}

// ── GPS 위치 업데이트 ───────────────────────────────────────
function onPosition(pos) {
  const { latitude: lat, longitude: lng, altitude: alt, accuracy, speed } = pos.coords;

  // 정확도 표시
  document.getElementById('accuracyBadge').textContent = `정확도 ±${Math.round(accuracy)}m`;

  // GPS 준비
  const dot = document.getElementById('gpsDot');
  dot.classList.add('gps-on');
  document.getElementById('gpsLabel').textContent = 'GPS 연결';

  if (!isTracking) return;

  // 정확도 너무 낮으면 무시 (100m 이상 오차)
  if (accuracy > 100) return;

  const newPos = { lat, lng, alt };

  if (lastPos) {
    const dist = haversine(lastPos.lat, lastPos.lng, lat, lng); // km

    // 너무 작은 움직임(0.003km = 3m 이하) 무시 → 노이즈 제거
    if (dist > 0.003) {
      totalDistance += dist;

      // 속도 계산
      const timeDiff = (pos.timestamp - (lastPos.timestamp || pos.timestamp)) / 1000 / 3600;
      if (timeDiff > 0) {
        currentSpeed = dist / timeDiff;
        speedHistory.push(currentSpeed);
        if (speedHistory.length > 20) speedHistory.shift();
      }

      // 고도 변화
      if (alt !== null && lastAlt !== null) {
        const diff = alt - lastAlt;
        if (diff > 0.5) altitudeGain += diff; // 0.5m 이상 상승만 누적
      }

      lastPos = { ...newPos, timestamp: pos.timestamp };
      positions.push({ lat, lng });

      updateUI();
    }
  } else {
    lastPos = { ...newPos, timestamp: pos.timestamp };
  }

  if (alt !== null) {
    currentAlt = Math.round(alt);
    lastAlt = alt;
  }
}

function onError(err) {
  let msg = 'GPS 오류';
  if (err.code === 1) msg = 'GPS 권한을 허용해주세요';
  if (err.code === 2) msg = 'GPS 신호 없음';
  if (err.code === 3) msg = 'GPS 시간 초과';
  showToast('⚠️ ' + msg);
  document.getElementById('gpsLabel').textContent = 'GPS 오류';
}

// ── Haversine 공식 (두 좌표 간 거리, km) ──────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── 활동 타입 판별 ─────────────────────────────────────────
function classifyActivity(speedKmh, altGain) {
  const avgSpeed = speedHistory.length > 0
    ? speedHistory.reduce((a,b)=>a+b,0)/speedHistory.length : 0;

  if (avgSpeed > 8) {
    return { icon: '🏃', type: '런닝', desc: `평균 ${avgSpeed.toFixed(1)} km/h` };
  }
  if (avgSpeed > 4 && altGain > 5) {
    return { icon: '🧗', type: '등산', desc: `고도 +${Math.round(altGain)}m 상승 중` };
  }
  if (avgSpeed > 1.5) {
    return { icon: '🚶', type: '걷기', desc: altGain > 2 ? `완만한 경사 +${Math.round(altGain)}m` : '평지 산책' };
  }
  return { icon: '⏸', type: '정지', desc: '움직임 감지 중...' };
}

// ── UI 업데이트 ────────────────────────────────────────────
function updateUI() {
  // 거리
  const km = totalDistance;
  if (km >= 1) {
    document.getElementById('distanceVal').textContent = km.toFixed(2);
    document.getElementById('distanceUnit').textContent = 'km';
  } else {
    document.getElementById('distanceVal').textContent = Math.round(km * 1000);
    document.getElementById('distanceUnit').textContent = 'm';
  }

  // 걸음 수 추산
  const stride = estimateStride(currentSpeed);
  const steps = Math.round((km * 1000) / stride);
  document.getElementById('stepsVal').textContent = steps.toLocaleString();

  // 속도
  document.getElementById('speedVal').textContent = currentSpeed.toFixed(1);

  // 페이스
  if (currentSpeed > 0.5) {
    const paceMin = 60 / currentSpeed;
    const paceM = Math.floor(paceMin);
    const paceS = Math.round((paceMin - paceM) * 60);
    document.getElementById('paceVal').textContent =
      `${paceM}'${String(paceS).padStart(2,'0')}"`;

    // 페이스 바 (3~10분/km 범위)
    const barPct = Math.min(100, Math.max(0, (10 - paceMin) / 7 * 100));
    document.getElementById('paceBar').style.width = barPct + '%';
  }

  // 활동 분류
  const act = classifyActivity(currentSpeed, altitudeGain);
  document.getElementById('actIcon').textContent = act.icon;
  document.getElementById('actType').textContent = act.type;
  document.getElementById('actDesc').textContent = act.desc;

  // 고도
  document.getElementById('altVal').textContent =
    currentAlt !== null ? currentAlt : '--';
}

// ── 타이머 ─────────────────────────────────────────────────
function updateTimer() {
  if (!startTime) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('timeVal').textContent =
    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── 시작 ───────────────────────────────────────────────────
function startTracking() {
  if (!navigator.geolocation) {
    showToast('이 기기는 GPS를 지원하지 않아요');
    return;
  }

  isTracking = true;
  startTime = Date.now();
  totalDistance = 0;
  lastPos = null;
  positions = [];
  currentSpeed = 0;
  altitudeGain = 0;
  lastAlt = null;
  speedHistory = [];

  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnStop').style.display = 'block';
  document.getElementById('trackDot').classList.add('tracking');
  document.getElementById('trackLabel').textContent = '기록 중';

  // GPS 추적 시작
  watchId = navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  });

  // 타이머
  timerInterval = setInterval(updateTimer, 1000);

  // 활동 초기화
  document.getElementById('actIcon').textContent = '📍';
  document.getElementById('actType').textContent = 'GPS 잡는 중';
  document.getElementById('actDesc').textContent = '잠시만 기다려주세요...';

  showToast('📍 GPS 위치 잡는 중... 야외에서 사용하세요');
}

// ── 종료 ───────────────────────────────────────────────────
function stopTracking() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  clearInterval(timerInterval);
  isTracking = false;

  document.getElementById('trackDot').classList.remove('tracking');
  document.getElementById('trackLabel').textContent = '완료';

  showResult();
}

// ── 결과 표시 ──────────────────────────────────────────────
function showResult() {
  const km = totalDistance;
  const stride = estimateStride(
    speedHistory.length > 0 ? speedHistory.reduce((a,b)=>a+b)/speedHistory.length : 3
  );
  const steps = Math.round((km * 1000) / stride);

  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;

  let paceStr = '--';
  if (km > 0 && elapsed > 0) {
    const paceMin = (elapsed / 60) / km;
    paceStr = `${Math.floor(paceMin)}'${String(Math.round((paceMin%1)*60)).padStart(2,'0')}"`;
  }

  const act = classifyActivity(
    speedHistory.length > 0 ? speedHistory.reduce((a,b)=>a+b)/speedHistory.length : 0,
    altitudeGain
  );

  document.getElementById('resEmoji').textContent = act.icon;
  document.getElementById('resDistance').textContent =
    km >= 1 ? km.toFixed(2) : Math.round(km * 1000);
  document.getElementById('resUnit').textContent = km >= 1 ? 'km' : 'm';
  document.getElementById('resSteps').textContent = steps.toLocaleString();
  document.getElementById('resTime').textContent = `${m}:${String(s).padStart(2,'0')}`;
  document.getElementById('resPace').textContent = paceStr;
  document.getElementById('resActivity').textContent = act.type;

  document.getElementById('resultOverlay').classList.add('show');
}

// ── 리셋 ───────────────────────────────────────────────────
function resetAll() {
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('btnStart').style.display = 'block';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('distanceVal').textContent = '0.00';
  document.getElementById('distanceUnit').textContent = 'km';
  document.getElementById('stepsVal').textContent = '0';
  document.getElementById('timeVal').textContent = '00:00';
  document.getElementById('speedVal').textContent = '0.0';
  document.getElementById('paceVal').textContent = "--'--\"";
  document.getElementById('paceBar').style.width = '0%';
  document.getElementById('altVal').textContent = '--';
  document.getElementById('actIcon').textContent = '🔍';
  document.getElementById('actType').textContent = '감지 중';
  document.getElementById('actDesc').textContent = '시작 버튼을 눌러주세요';
  document.getElementById('trackDot').classList.remove('tracking');
  document.getElementById('trackLabel').textContent = '대기';
  document.getElementById('accuracyBadge').textContent = '정확도 --m';
}

// ── 토스트 ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 페이지 로드시 GPS 준비
navigator.geolocation?.getCurrentPosition(
  () => {
    document.getElementById('gpsDot').classList.add('gps-on');
    document.getElementById('gpsLabel').textContent = 'GPS 준비';
  },
  () => {}
);
</script>
